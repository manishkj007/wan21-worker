name: Build & Push Docker Image

on:
  workflow_dispatch:          # manual trigger from GitHub UI
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'handler_runpod.py'
      - 'requirements.txt'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180      # 3 hours for 35GB+ image

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          echo "=== Before cleanup ==="
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/powershell /usr/share/swift \
            /usr/local/.ghcup /usr/lib/jvm /opt/hostedtoolcache/CodeQL \
            /usr/local/graalvm /usr/local/share/chromium \
            /usr/local/lib/node_modules /opt/hostedtoolcache
          sudo docker image prune --all --force
          sudo apt-get clean
          echo "=== After cleanup ==="
          df -h /

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/wan21-worker:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/wan21-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
